<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">

<title>MODA Marketing KPI System — Demo</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Google Sans',Roboto,Arial,sans-serif;background:#fff;overflow-x:hidden;}

/* Google Sheets top bar */
.gs-topbar{height:40px;background:#fff;display:flex;align-items:center;padding:0 12px;border-bottom:1px solid #dadce0;}
.gs-icon{width:28px;height:28px;margin-right:8px;}
.gs-icon svg{width:28px;height:28px;}
.gs-title{font-size:17px;color:#202124;font-weight:400;}

/* Formula bar */
.gs-formula{height:28px;background:#fff;display:flex;align-items:center;border-bottom:1px solid #e0e0e0;padding:0 0 0 0;font-size:12px;color:#202124;}
.gs-namebox{width:80px;border-right:1px solid #e0e0e0;text-align:center;color:#444;height:100%;display:flex;align-items:center;justify-content:center;background:#fff;font-size:12px;}
.gs-fx{padding:0 8px;color:#5f6368;font-style:italic;height:100%;display:flex;align-items:center;}

/* Column headers */
.gs-colhdr{display:flex;background:#f8f9fa;border-bottom:1px solid #e0e0e0;height:22px;padding-left:36px;}
.gs-colhdr span{display:flex;align-items:center;justify-content:center;font-size:11px;color:#5f6368;border-right:1px solid #e0e0e0;flex-shrink:0;}

/* Main grid area */
.gs-grid{position:relative;}
.gs-row{display:flex;border-bottom:1px solid #e8eaed;min-height:24px;}
.gs-rownum{width:36px;background:#f8f9fa;border-right:1px solid #e0e0e0;display:flex;align-items:center;justify-content:center;font-size:11px;color:#5f6368;flex-shrink:0;}
.gs-cell{border-right:1px solid #e8eaed;display:flex;align-items:center;padding:0 4px;font-size:13px;color:#202124;flex-shrink:0;overflow:hidden;white-space:nowrap;}

/* Merged header cells */
.gs-merged{font-weight:700;}
.gs-bg-blue{background:#1a73e8;color:#fff !important;}
.gs-bg-lightblue{background:#d0e0fc;}
.gs-bg-gray{background:#f1f3f4;}
.gs-bg-green{background:#34a853;color:#fff !important;}
.gs-bg-lightgreen{background:#d9ead3;}
.gs-bg-red-alert{background:#fce8e6;color:#c5221f !important;}
.gs-bg-green-alert{background:#e6f4ea;color:#137333 !important;}
.gs-bold{font-weight:700;}
.gs-center{justify-content:center;}
.gs-right{justify-content:flex-end;}
.gs-small{font-size:11px;}
.gs-gray{color:#5f6368 !important;}
.gs-section{font-weight:700;font-size:13px;}

/* Status emoji */
.gs-status{justify-content:center;font-size:14px;}

/* Tab bar */
.gs-tabbar{position:fixed;bottom:0;left:0;right:0;height:30px;background:#f1f3f4;border-top:1px solid #dadce0;display:flex;align-items:flex-end;padding:0 40px;z-index:100;}
.gs-tab{height:26px;padding:0 16px;font-size:12px;color:#5f6368;display:flex;align-items:center;border:1px solid #dadce0;border-bottom:none;border-radius:4px 4px 0 0;background:#f1f3f4;margin-right:1px;cursor:default;transition:all .2s;white-space:nowrap;}
.gs-tab.active{background:#fff;color:#1a73e8;font-weight:500;border-bottom:2px solid #1a73e8;}
.gs-tab .lock{font-size:10px;margin-left:3px;}

/* Cell highlight for typing */
.gs-cell.typing{outline:2px solid #1a73e8;background:#e8f0fe;z-index:10;}
.cursor{display:inline-block;width:1.5px;height:15px;background:#202124;animation:blink .53s infinite;vertical-align:middle;margin-left:0;}
@keyframes blink{0%,49%{opacity:1}50%,100%{opacity:0}}

/* Phase overlay */
.phase-overlay{position:fixed;bottom:40px;left:50%;transform:translateX(-50%);background:rgba(32,33,36,.88);color:#fff;padding:10px 28px;border-radius:8px;font-size:14px;font-weight:500;z-index:200;opacity:0;transition:opacity .35s;pointer-events:none;}
.phase-overlay.show{opacity:1;}

/* Replay */
.replay-btn{position:fixed;bottom:45px;left:50%;transform:translateX(-50%);background:#1a73e8;color:#fff;border:none;padding:10px 28px;border-radius:24px;font-size:13px;font-weight:500;cursor:pointer;z-index:200;opacity:0;transition:opacity .3s;box-shadow:0 2px 8px rgba(26,115,232,.35);}
.replay-btn:hover{background:#1557b0;}
.replay-btn.show{opacity:1;}

/* Scrollbar area padding */
.gs-body{padding-bottom:36px;}

/* Chart embedded in sheet */
.gs-chart-overlay{position:absolute;right:20px;top:0;width:340px;background:#fff;border:1px solid #dadce0;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1);padding:12px;z-index:50;opacity:0;transition:opacity .5s;}
.gs-chart-overlay.show{opacity:1;}
.chart-title{font-size:12px;font-weight:600;color:#202124;text-align:center;margin-bottom:10px;}
.bar-chart{display:flex;align-items:flex-end;justify-content:center;gap:4px;height:110px;}
.bar-group{display:flex;flex-direction:column;align-items:center;}
.bar-pair{display:flex;gap:2px;align-items:flex-end;height:90px;}
.bar{width:14px;border-radius:2px 2px 0 0;transition:height 1s ease-out;}
.bar-label{font-size:8px;color:#5f6368;text-align:center;margin-top:2px;max-width:38px;line-height:1.1;}
.legend{display:flex;gap:10px;justify-content:center;margin-top:6px;}
.legend span{font-size:9px;color:#5f6368;display:flex;align-items:center;gap:3px;}
.legend i{width:8px;height:8px;border-radius:1px;display:inline-block;}
</style>

function renderSheet(rows, colWidths, startRow){
  const body = document.getElementById('sheetBody');
  body.innerHTML = '';

  // Column headers
  const colHdr = document.createElement('div');
  colHdr.className = 'gs-colhdr';
  colWidths.forEach((w,i)=>{
    const s = document.createElement('span');
    s.style.width = w+'px';
    s.textContent = COL_LETTERS[i]||'';
    colHdr.appendChild(s);
  });
  body.appendChild(colHdr);

  // Rows
  rows.forEach((row, ri)=>{
    const rowEl = document.createElement('div');
    rowEl.className = 'gs-row';

    const rn = document.createElement('div');
    rn.className = 'gs-rownum';
    rn.textContent = (startRow||1) + ri;
    rowEl.appendChild(rn);

    let ci = 0;
    row.forEach(cell=>{
      const cellEl = document.createElement('div');
      cellEl.className = 'gs-cell' + (cell.cls ? ' '+cell.cls : '');
      const spanCount = cell.span || 1;
      let totalW = 0;
      for(let s=0; s<spanCount && (ci+s)<colWidths.length; s++){
        totalW += colWidths[ci+s];
      }
      cellEl.style.width = totalW + 'px';
      cellEl.textContent = cell.text;
      if(cell.id) cellEl.id = cell.id;
      rowEl.appendChild(cellEl);
      ci += spanCount;
    });

    // Fill remaining cols
    while(ci < colWidths.length){
      const cellEl = document.createElement('div');
      cellEl.className = 'gs-cell';
      cellEl.style.width = colWidths[ci]+'px';
      ci++;
      rowEl.appendChild(cellEl);
    }

    body.appendChild(rowEl);
  });
}

// ── Animation helpers ──
function $(id){ return document.getElementById(id); }
function sleep(ms){ return new Promise(r=>setTimeout(r,ms)); }

function showPhase(text){
  const el = $('phaseLabel');
  el.textContent = text;
  el.classList.add('show');
}
function hidePhase(){
  $('phaseLabel').classList.remove('show');
}

function switchTab(name){
  document.querySelectorAll('.gs-tab').forEach(t=>t.classList.remove('active'));
  if(name==='dashboard') $('tabDash').classList.add('active');
  else $('tabAdmin').classList.add('active');
}

async function typeInCell(id, text, delay){
  const cell = $(id);
  if(!cell) return;
  cell.classList.add('typing');
  cell.innerHTML = '<span class="cursor"></span>';
  // Update namebox
  const colIdx = parseInt(id.split('-')[1]);
  $('nameBox').textContent = COL_LETTERS[colIdx] + '9';
  await sleep(250);
  for(let i=0; i<text.length; i++){
    cell.innerHTML = text.substring(0,i+1) + '<span class="cursor"></span>';
    await sleep(delay||55);
  }
  await sleep(200);
  cell.textContent = text;
  cell.classList.remove('typing');
}

function animateVal(id, target, prefix, suffix, duration){
  const el = $(id);
  if(!el) return;
  const startTime = performance.now();
  function tick(now){
    const p = Math.min((now-startTime)/duration, 1);
    const eased = 1 - Math.pow(1-p, 3);
    const cur = Math.round(target * eased);
    el.textContent = (prefix||'') + cur.toLocaleString() + (suffix||'');
    if(p<1) requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ── Chart ──
function buildChart(animated){
  // Remove old
  let old = document.querySelector('.gs-chart-overlay');
  if(old) old.remove();

  const chart = document.createElement('div');
  chart.className = 'gs-chart-overlay' + (animated ? ' show' : '');
  chart.innerHTML = '<div class="chart-title">Today\'s KPI: Target vs Actual</div>';

  const barArea = document.createElement('div');
  barArea.className = 'bar-chart';

  const data = [
    {l:'Posts',t:10,a:42},{l:'Msgs',t:75,a:42},{l:'Replies',t:500,a:35},
    {l:'Leads',t:75,a:7},{l:'Follow',t:125,a:12},{l:'Meets',t:20,a:3}
  ];
  const maxV = 500;

  data.forEach(d=>{
    const g = document.createElement('div');
    g.className = 'bar-group';
    const p = document.createElement('div');
    p.className = 'bar-pair';

    const tb = document.createElement('div');
    tb.className = 'bar';
    tb.style.background = '#dadce0';
    tb.style.height = (d.t/maxV*85)+'px';
    tb.style.width = '12px';

    const ab = document.createElement('div');
    ab.className = 'bar';
    const pct = d.a/d.t;
    ab.style.background = pct>=1?'#34a853':pct>=0.1?'#fbbc04':'#ea4335';
    ab.style.width = '12px';
    if(animated){
      ab.style.height = '0px';
      setTimeout(()=>{ab.style.height=(d.a/maxV*85)+'px';},150);
    } else {
      ab.style.height = '0px';
    }

    p.appendChild(tb); p.appendChild(ab);
    const lb = document.createElement('div');
    lb.className = 'bar-label';
    lb.textContent = d.l;
    g.appendChild(p); g.appendChild(lb);
    barArea.appendChild(g);
  });

  chart.appendChild(barArea);
  chart.innerHTML += '<div class="legend"><span><i style="background:#dadce0"></i> Target</span><span><i style="background:#1a73e8"></i> Actual</span></div>';

  // Position it relative to sheet body
  const body = $('sheetBody');
  body.style.position = 'relative';
  chart.style.top = '90px';
  body.appendChild(chart);

  if(!animated){
    setTimeout(()=>chart.classList.add('show'),100);
  }
}

// ── Demo flow ──
async function startDemo(){

  // Phase 1: Dashboard with zeros
  switchTab('dashboard');
  renderSheet(dashData(), COL_W, 1);
  buildChart(false);
  showPhase('Step 1: Dashboard shows all KPIs at zero');
  await sleep(3500);
  hidePhase();
  await sleep(1000);

  // Phase 2: Switch to Admin_Input
  showPhase('Step 2: Open Admin_Input tab to enter data');
  await sleep(1800);
  hidePhase();
  switchTab('admin');
  renderSheet(adminData(), COL_W_ADMIN, 1);
  $('nameBox').textContent = 'A5';
  await sleep(1500);

  // Phase 3: Type new row
  showPhase('Step 3: Type today\'s numbers...');
  await sleep(1200);
  hidePhase();
  await sleep(400);

  const newData = ['3/27/2026','42','35','15','7','12','15','3','1','5,000'];
  for(let i=0; i<newData.length; i++){
    await typeInCell('tc-'+i, newData[i], 50);
    await sleep(180);
  }
  // Notes column — type slower for effect
  await typeInCell('tc-9', 'Good progress!', 40);
  $('nameBox').textContent = 'J9';

  await sleep(1200);

  // Phase 4: Switch back to Dashboard
  showPhase('Step 4: Dashboard auto-updates!');
  await sleep(1500);
  hidePhase();
  switchTab('dashboard');

  const afterVals = {
    posts:'42', stories:'0', videos:'0', messages:'42', replies:'35', avgres:'15',
    leads:'7', followups:'12', meetings:'3', deals:'1', dealval:'$5,000',
    wleads:'31', wmeet:'12', wrate:'39%',
    s_posts:'🟢', s_stories:'🔴', s_videos:'🔴', s_messages:'🟡', s_replies:'🔴',
    s_leads:'🔴', s_followups:'🔴', s_meetings:'🟡',
    alertPosts:'✅ Posts OK', alertPostsOk:true,
    alertLeads:'✅ Leads OK', alertLeadsOk:true,
    alertFollow:'✅ Follow-ups OK', alertFollowOk:true,
  };

  // First render with zeros, then animate
  renderSheet(dashData(), COL_W, 1);
  await sleep(600);

  // Animate numbers counting up
  const anims = [
    {id:'v-posts',val:42},{id:'v-messages',val:42},{id:'v-replies',val:35},{id:'v-avgres',val:15},
    {id:'v-leads',val:7},{id:'v-followups',val:12},{id:'v-meetings',val:3},{id:'v-deals',val:1},
    {id:'v-wleads',val:31},{id:'v-wmeet',val:12}
  ];
  anims.forEach(a=> animateVal(a.id, a.val, '', '', 1200));
  animateVal('v-dealval', 5000, '$', '', 1200);
  animateVal('v-wrate', 39, '', '%', 1200);

  // Status changes after a beat
  await sleep(700);
  const statusMap = {
    's-posts':'🟢','s-stories':'🔴','s-videos':'🔴','s-messages':'🟡','s-replies':'🔴',
    's-leads':'🔴','s-followups':'🔴','s-meetings':'🟡'
  };
  Object.entries(statusMap).forEach(([id,v])=>{
    const el = $(id);
    if(el) el.textContent = v;
  });

  // Alerts
  await sleep(400);
  const ap = $('a-posts');
  if(ap){ap.textContent='✅ Posts OK';ap.className='gs-cell gs-bg-green-alert';ap.style.width=(COL_W[1]+COL_W[2])+'px';}
  const al = $('a-leads');
  if(al){al.textContent='✅ Leads OK';al.className='gs-cell gs-bg-green-alert';al.style.width=(COL_W[1]+COL_W[2])+'px';}
  const af = $('a-follow');
  if(af){af.textContent='✅ Follow-ups OK';af.className='gs-cell gs-bg-green-alert';af.style.width=(COL_W[1]+COL_W[2])+'px';}

  // Chart
  buildChart(true);

  await sleep(3000);
  $('replayBtn').classList.add('show');
}

// Auto-start
window.addEventListener('load',()=>setTimeout(startDemo,600));
</script>
</body>
